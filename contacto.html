    <link rel="stylesheet" href="styles/global.css" />

  <body>
    <header>
      <nav>
        <ul>

          <li><a href="publicidad.html">Publicidad</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>

    <main>
      <h1>Contáctanos</h1>

      <section class="contacto-box">
        <form>
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" placeholder="Ingresar nombre" />

          <label for="email">Correo electrónico</label>
          <input type="email" id="email" placeholder="correo@ejemplo.com" />

          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" placeholder="Ingresar mensaje"></textarea>

          <button type="submit">Enviar</button>
        </form>
      </section>
    </main>

    <footer>
      <p><a href="main.html">Volver al menú principal</a></p>
    </footer>
