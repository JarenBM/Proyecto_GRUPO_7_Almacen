<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Almacén</title>
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/gestion.css" />
  </head>

  <body>
    <header>
      <nav>
        <ul>
          <li><a href="main.html">Inicio</a></li>
          <li><a href="gestion.html">Gestión</a></li>
          <li><a href="publicidad.html">Publicidad</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <h1>Gestión de Almacén</h1>

      <!-- 🔹 CONTENEDOR DE FORMULARIOS -->
      <section class="formularios">
        <!-- 🔹 REGISTRAR ENTRADA -->
        <div class="form-box">
          <h2>Registrar Entrada</h2>

          <form>
            <label for="codigoEntrada">Código</label>
            <input
              type="text"
              id="codigoEntrada"
              placeholder="ID del producto"
            />

            <label for="productoEntrada">Producto</label>
            <input
              type="text"
              id="productoEntrada"
              placeholder="Nombre del producto"
            />

            <label for="cantidadEntrada">Cantidad</label>
            <input type="number" id="cantidadEntrada" placeholder="Cantidad" />

            <label for="categoriaEntrada">Categoría</label>
            <input type="text" id="categoriaEntrada" placeholder="Categoría" />

            <label for="almaceneroEntrada">Almacenero</label>
            <input
              type="text"
              id="almaceneroEntrada"
              placeholder="Responsable"
            />

            <button type="submit">Registrar Entrada</button>
          </form>
        </div>

        <!-- 🔹 REGISTRAR SALIDA -->
        <div class="form-box">
          <h2>Registrar Salida</h2>

          <form>
            <label for="codigoSalida">Código</label>
            <input
              type="text"
              id="codigoSalida"
              placeholder="ID del producto"
            />

            <label for="productoSalida">Producto</label>
            <input
              type="text"
              id="productoSalida"
              placeholder="Nombre del producto"
            />

            <label for="cantidadSalida">Cantidad</label>
            <input type="number" id="cantidadSalida" placeholder="Cantidad" />

            <label for="categoriaSalida">Categoría</label>
            <input type="text" id="categoriaSalida" placeholder="Categoría" />

            <label for="almaceneroSalida">Almacenero</label>
            <input
              type="text"
              id="almaceneroSalida"
              placeholder="Responsable"
            />

            <button type="submit">Registrar Salida</button>
          </form>
        </div>
      </section>

      <!-- 🔹 TABLA -->
      <section>
        <h2>Listado de productos</h2>

        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Producto</th>
              <th>Cantidad</th>
              <th>Categoría</th>
              <th>Almacenero</th>
            </tr>
          </thead>

          <tbody>
            <tr>
              <td>1</td>
              <td>Arroz</td>
              <td>50</td>
              <td>Cereales</td>
              <td>Juan Pérez</td>
            </tr>
            <tr>
              <td>2</td>
              <td>Gaseosa</td>
              <td>30</td>
              <td>Bebidas</td>
              <td>María López</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer>
      <p><a href="main.html">Volver al menú principal</a></p>
    </footer>
  </body>
</html>
