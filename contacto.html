<!doctype html>
<html lang="es">
  <head>
    <title>Contacto</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="styles/contacto.css" />
  </head>
  <body>
    <h1>Contáctanos</h1>
    <div class="container">
      <div class="contact-form">
      <form>
        <label for="nombre">Nombre:</label><br />
        <input
          type="text"
          id="nombre"
          name="nombre"
          placeholder="Ingresar nombre"
        /><br />
        <label for="email">Correo electrónico:</label><br />
        <input
          type="email"
          id="email"
          name="email"
          placeholder="correo@ejemplo.com"
        /><br />
        <label for="mensaje">Mensaje:</label><br />
        <textarea
          id="mensaje"
          name="mensaje"
          placeholder="Ingresar mensaje"
        ></textarea
        ><br />
        <input type="submit" value="Enviar" />
      </form>
      <p><a class="btn_home" href="main.html">Volver al menú principal</a></p>
    </div>
    <div class="contact-info">
      <h2>Información de contacto</h2>
      <p>Teléfono: +52 987 456 123</p>
      <p>Email: contacto@ejemplo.com</p>
      <p>Dirección: Calle Real 123, Huancayo, Perú</p>
      <ul class="social">
        <li><a href="https://www.facebook.com" class="facebook"></a></li>
        <li><a href="https://www.twitter.com" class="twitter"></a></li>
        <li><a href="https://www.instagram.com" class="instagram"></a></li>
      </ul>
    </div>  
    </div>
  </body>
</html>
